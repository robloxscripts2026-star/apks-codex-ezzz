<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS APKS | MANTENIMIENTO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Outfit:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f2ff; --neon-pink: #ff00ea; }
        body { 
            background-color: #020205; 
            color: white; 
            font-family: 'Outfit', sans-serif; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
            margin: 0;
        }

        /* Efecto de Escaneo de Fondo */
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0, 242, 255, 0) 0%, rgba(0, 242, 255, 0.1) 50%, rgba(0, 242, 255, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { bottom: 100%; }
            100% { bottom: -100px; }
        }

        .card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 242, 255, 0.2);
            padding: 3rem;
            border-radius: 40px;
            backdrop-filter: blur(10px);
            text-align: center;
            max-width: 450px;
            position: relative;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.1);
        }

        .icon-box {
            font-size: 50px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px var(--neon-blue));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .nexus-title {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 5px;
            color: var(--neon-blue);
            text-shadow: 0 0 20px var(--neon-blue);
        }

        .status-badge {
            background: rgba(0, 242, 255, 0.1);
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 20px;
        }

        .cloud-info {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 25px;
            padding-top: 20px;
            font-size: 12px;
            color: #888;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--neon-pink);
            border-radius: 50%;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="scanline"></div>

    <div class="card">
        <div class="status-badge">Sistema Offline</div>
        
        <div class="icon-box">🏗️</div>
        
        <h1 class="nexus-title text-3xl font-black mb-4">NEXUS APKS</h1>
        
        <p class="text-gray-400 text-sm leading-relaxed">
            Estamos actualizando el núcleo del sistema para el lanzamiento de <span class="text-white font-bold">GB WHATSAPP</span> y nuevas funciones VIP.
        </p>

        <div class="loader"></div>

        <h2 class="text-xs font-bold text-pink-500 uppercase tracking-widest">Página en mantenimiento</h2>

        <div class="cloud-info">
            <p>☁️ <span class="text-cyan-400 font-bold uppercase">Tus datos están guardados en la nube</span></p>
            <p class="mt-1 opacity-50">Firebase Sync: Activo ✓</p>
        </div>
    </div>

</body>
</html>
