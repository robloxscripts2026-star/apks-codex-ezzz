        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .badge-reg { background: var(--neon-pink); color: white; font-size: 10px; padding: 2px 8px; border-radius: 5px; margin-bottom: 5px; display: inline-block; font-weight: 900; }

        function togglePass() { const p = document.getElementById('pass'); p.type = p.type === 'password' ? 'text' : 'password'; event.target.innerText = p.type === 'password' ? '😶‍🌫️' : '👁️'; }
        
        function cambiarModo() { esLogin = !esLogin; document.getElementById('name-container').classList.toggle('hidden'); document.getElementById('toggle-btn').innerText = esLogin ? '¿No tienes cuenta? Regístrate' : '¿Ya tienes cuenta? Entra'; }

        async function manejarAuth() {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value, n = document.getElementById('user-name').value;
            try {
                if(esLogin) { await auth.signInWithEmailAndPassword(e, p); }
                else {
                    await auth.createUserWithEmailAndPassword(e, p);
                    localStorage.setItem('nexus_name', n);
                    fetch(WEB_REG, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ embeds: [{ title: "👤 REGISTRO", fields: [{ name: "USER", value: n }, { name: "EMAIL", value: e }], color: 0x00f2ff }] }) });
                }
                isGuest = false;
                arranqueNexus(localStorage.getItem('nexus_name') || e.split('@')[0]);
            } catch (err) { alert(err.message); }
        }

        function entrarInvitado() { isGuest = true; arranqueNexus("INVITADO 👤"); }

        function arranqueNexus(nombre) {
            document.getElementById('auth-screen').classList.add('hidden');
            const intro = document.getElementById('nexus-intro'), bar = document.getElementById('load-bar');
            intro.style.display = 'flex';
            let w = 0;
            const int = setInterval(() => { w += 25; bar.style.width = w + '%'; if(w >= 100) { clearInterval(int); setTimeout(() => { intro.style.display = 'none'; abrirDashboard(nombre); }, 500); } }, 200);
        }

        function abrirDashboard(nombre) {
            document.getElementById('store-screen').classList.remove('hidden');
            document.getElementById('welcome-msg').innerText = "HOLA " + nombre.toUpperCase();
            document.getElementById('tiktok-btn').style.display = 'flex';
            document.getElementById('pedido-btn').style.display = 'flex';
            const grid = document.getElementById('app-grid'); grid.innerHTML = '';
            apps.forEach(app => {
                grid.innerHTML += `
                <div class="apk-card" data-aos="fade-up">
                    <img src="${app.img}" class="apk-img" onerror="this.src='https://via.placeholder.com/300x160?text=Nexus+Apk'">
                    <div class="p-5">
                        ${app.r ? '<span class="badge-reg">REGISTRADO 🔒</span>' : ''}
                        <h3 class="font-black text-xs uppercase mb-4">${app.n}</h3>
                        <button onclick="gestionarApk('${app.n}', '${app.l}', ${app.r})" class="btn-action text-[10px]">GESTIONAR</button>
                    </div>
                </div>`;
            });
        }

        function gestionarApk(n, l, r) {
            if(isGuest && r) {
                mostrarModal(`
                    <h2 class="text-2xl font-black mb-4">ACCESO DENEGADO ❌</h2>
                    <p class="text-gray-400 text-sm mb-6 uppercase">Esta APK es solo para usuarios registrados.</p>
                    <button onclick="location.reload()" class="btn-action mb-3">REGISTRARME</button>
                    <button onclick="cerrarModal()" class="text-[10px] text-gray-500 uppercase font-bold">REGRESAR</button>
                `);
            } else {
                window.open(l);
            }
        }

        function abrirPeticion() {
            mostrarModal(`
                <h3 class="text-xl font-black text-cyan-400 mb-6">NUEVA PETICIÓN 📦</h3>
                <input type="text" id="p-apk" placeholder="NOMBRE APK" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl outline-none text-xs mb-4">
                <button onclick="cerrarModal()" class="btn-action">ENVIAR</button>
            `);
        }

        function mostrarModal(html) { document.getElementById('modal-content').innerHTML = html; document.getElementById('action-modal').style.display = 'flex'; }
        function cerrarModal() { document.getElementById('action-modal').style.display = 'none'; }
        function cerrarSesion() { auth.signOut().then(() => location.reload()); }

        particlesJS('particles-js', { "particles": { "number": { "value": 40 }, "color": { "value": "#00f2ff" }, "opacity": { "value": 0.1 }, "size": { "value": 1.5 }, "move": { "speed": 1 } } });
    </script>
