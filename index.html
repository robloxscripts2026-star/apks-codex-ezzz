<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYPER DRIP | PRESTIGE HUB ⚡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { --accent: #00f2ff; --bg: #030305; }
        body {
            background-color: var(--bg);
            color: white; font-family: 'Outfit', sans-serif;
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #030305 100%);
            min-height: 100vh;
        }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .card-active { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; position: relative; overflow: hidden; }
        .card-active:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 10px 30px rgba(0, 242, 255, 0.15); }
        .locked { opacity: 0.4; filter: grayscale(1); border: 1px dashed rgba(255,255,255,0.1); }
        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            background-size: 200% 100%;
            animation: shimmer 3s infinite;
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .glow-text { text-shadow: 0 0 15px rgba(0, 242, 255, 0.6); }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <section id="auth-screen" class="w-full max-w-md my-10">
        <div class="text-center mb-10">
            <h1 class="text-7xl font-black italic tracking-tighter glow-text">HYPER <span class="text-[#00f2ff]">DRIP</span></h1>
            <p class="text-gray-500 text-[9px] tracking-[6px] mt-4 uppercase font-bold">Secure Access System</p>
        </div>

        <div class="glass p-8 rounded-[40px] border-t border-white/10">
            <div id="auth-title" class="text-xl font-bold mb-8 text-center tracking-widest uppercase text-gray-400 italic">INICIAR SESIÓN</div>
            
            <div class="space-y-4">
                <div id="name-container" class="hidden">
                    <input type="text" id="user-name" placeholder="USUARIO" class="w-full p-4 bg-black/60 border border-white/5 rounded-2xl outline-none focus:border-[#00f2ff] text-sm tracking-wider uppercase">
                </div>
                
                <input type="email" id="email" placeholder="CORREO ELECTRÓNICO" class="w-full p-4 bg-black/60 border border-white/5 rounded-2xl outline-none focus:border-[#00f2ff] text-sm tracking-wider uppercase">
                
                <div class="relative">
                    <input type="password" id="pass" placeholder="CONTRASEÑA 🔑" class="w-full p-4 bg-black/60 border border-white/5 rounded-2xl outline-none focus:border-[#00f2ff] text-sm">
                </div>
                
                <button onclick="manejarAuth()" class="w-full p-5 bg-white text-black rounded-2xl font-black text-sm hover:bg-[#00f2ff] transition-all mt-4 tracking-widest active:scale-95 uppercase">
                    <span id="btn-text">EJECUTAR ACCESO</span>
                </button>
                
                <button onclick="cambiarModo()" id="toggle-btn" class="w-full text-[10px] text-gray-500 mt-6 uppercase tracking-widest hover:text-white transition-colors">
                    ¿Eres nuevo? <span class="text-[#00f2ff] underline">REGISTRARSE</span>
                </button>
            </div>
        </div>
    </section>

    <section id="store-screen" class="hidden w-full max-w-4xl py-10">
        <header class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
            <div class="text-center md:text-left">
                <h2 class="text-4xl font-black italic tracking-tighter">PREMIUM <span class="text-[#00f2ff]">REPOSITORY</span></h2>
                <p class="text-gray-500 text-xs mt-1 uppercase tracking-widest italic">User: <span id="display-name" class="text-[#00f2ff] font-bold">...</span></p>
            </div>
            <button onclick="location.reload()" class="glass px-6 py-3 rounded-full text-[10px] font-bold tracking-[3px] hover:text-red-500 border-red-500/20">LOGOUT</button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="app-grid">
            </div>
    </section>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAzzRWHGhYVFgkWyRwfgNKc5Ql52U4xxM8",
          authDomain: "hyper-drip.firebaseapp.com",
          projectId: "hyper-drip",
          storageBucket: "hyper-drip.firebasestorage.app",
          messagingSenderId: "1023275797824",
          appId: "1:1023275797824:web:378ce9a674db72af05fea5"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1491367258470219796/PApu8j67Mnz9GN8JK6vqPCiNlaZvoqnEG9GBEjSBEOXAawRGc_UY-EMXVNnenDxzUjlr";

        let esModoLogin = true;

        const apps = [
            { n: 'CAP CUT PRO', d: 'v14.7.0 Unlocked', i: '🎬', l: 'https://www.mediafire.com/file/epm2wsvnt6qe3il/CapCut_PR____14.7.0_ui_old.apk/file' },
            { n: 'DELTA EXECUTOR', d: 'Latest Android', i: '🤖', l: 'https://deltaexploits.gg/delta-executor-android' },
            { n: 'DTW MOD MENU', d: 'Private 0909f6', i: '🔥', l: 'https://www.mediafire.com/file/we76rly3z832ba8/DTW_ModMenu_0909f6.apk/file' },
            { n: 'GTA SAN ANDREAS', d: 'v2.11.277 Mod', i: '🚗', l: 'https://www.mediafire.com/file/5brnv5qxhtng8no/gta%20san%20andreas%20v2.11.277%20-%20espacioapk.com.apk/file' },
            { n: 'CANVA PRO', d: 'Premium Access', i: '🎨', l: 'https://drive.google.com/file/d/1j6TawOR3bG-g2QVjE5YA1hfEiupb9xY6/view' },
            { n: 'MINECRAFT APK', d: 'Full Version', i: '⛏️', l: 'https://mineckraftapk.com.mx/' },
            { n: 'PROXIMAMENTE', d: 'Encrypted...', i: '⌛', l: '#', locked: true },
            { n: 'PROXIMAMENTE', d: 'Encrypted...', i: '⌛', l: '#', locked: true },
            { n: 'PROXIMAMENTE', d: 'Encrypted...', i: '⌛', l: '#', locked: true },
            { n: 'PROXIMAMENTE', d: 'Encrypted...', i: '⌛', l: '#', locked: true }
        ];

        function cambiarModo() {
            esModoLogin = !esModoLogin;
            document.getElementById('auth-title').innerText = esModoLogin ? "INICIAR SESIÓN" : "REGISTRARSE";
            document.getElementById('btn-text').innerText = esModoLogin ? "EJECUTAR ACCESO" : "CREAR CUENTA";
            document.getElementById('name-container').classList.toggle('hidden');
            document.getElementById('toggle-btn').innerHTML = esModoLogin ? 
                '¿Eres nuevo? <span class="text-[#00f2ff] underline">REGISTRARSE</span>' : 
                '¿Ya tienes cuenta? <span class="text-[#00f2ff] underline">INICIAR SESIÓN</span>';
        }

        async function manejarAuth() {
            const nombre = document.getElementById('user-name').value;
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;

            if(!email || !pass || (!esModoLogin && !nombre)) return alert("Completa todos los campos");

            try {
                if(esModoLogin) {
                    await auth.signInWithEmailAndPassword(email, pass);
                    entrarTienda(email.split('@')[0]);
                } else {
                    await auth.createUserWithEmailAndPassword(email, pass);
                    // Notificar a Discord con el nombre
                    fetch(DISCORD_WEBHOOK, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            embeds: [{
                                title: "🚀 NUEVO MIEMBRO: " + nombre.toUpperCase(),
                                description: `**Correo:** ${email}\n**Sistema:** Hyper Drip Cloud`,
                                color: 65535
                            }]
                        })
                    });
                    entrarTienda(nombre);
                }
            } catch (e) { alert("Error: " + e.message); }
        }

        function entrarTienda(nombre) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('store-screen').classList.remove('hidden');
            document.getElementById('display-name').innerText = nombre.toUpperCase();
            
            const grid = document.getElementById('app-grid');
            apps.forEach(app => {
                grid.innerHTML += `
                <div ${!app.locked ? `onclick="window.open('${app.l}')"` : ''} class="glass p-6 rounded-[30px] flex items-center justify-between border-white/5 ${app.locked ? 'locked' : 'card-active shimmer'}">
                    <div class="flex items-center gap-5">
                        <div class="text-2xl bg-white/5 w-14 h-14 flex items-center justify-center rounded-2xl border border-white/10 italic font-black">${app.i}</div>
                        <div>
                            <h3 class="font-bold text-sm tracking-tight">${app.n}</h3>
                            <p class="text-[10px] text-gray-500 font-medium">${app.d}</p>
                        </div>
                    </div>
                    <div class="text-[9px] font-black tracking-widest ${app.locked ? 'text-gray-600' : 'text-[#00f2ff] uppercase'}">
                        ${app.locked ? 'LOCKED' : 'DOWNLOAD'}
                    </div>
                </div>`;
            });
        }
    </script>
</body>
</html>
