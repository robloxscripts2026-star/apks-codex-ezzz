<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PÁGINA SUSPENDIDA | APK MODS</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --primary: #ff0033; /* Rojo para indicar suspensión */
            --accent: #a855f7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background-color: var(--bg);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
        }

        /* Fondo animado sutil */
        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(255, 0, 51, 0.1) 0%, transparent 70%);
            z-index: -1;
        }

        .container { padding: 20px; }

        .icon {
            font-size: 80px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px var(--primary));
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(to bottom, #fff, #666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        p {
            color: #94a3b8;
            font-size: 1.2rem;
            max-width: 400px;
            margin: 0 auto 30px;
            line-height: 1.6;
        }

        .status-box {
            display: inline-block;
            padding: 10px 20px;
            border: 1px solid rgba(255, 0, 51, 0.3);
            border-radius: 50px;
            background: rgba(255, 0, 51, 0.05);
            color: var(--primary);
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .loader {
            margin-top: 40px;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            display: inline-block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="container">
        <div class="icon">⚠️</div>
        <h1>PÁGINA SUSPENDIDA</h1>
        <p>Estamos realizando mejoras en el sistema para brindarte una mejor experiencia VIP.</p>
        
        <div class="status-box">
            Mantenimiento en curso
        </div>

        <br>
        <div class="loader"></div>
    </div>

</body>
</html>
